          <form class="row g-3 mt-5" th:action="@{/employees/{id} (id=${employees2.id})}" th:object="${employees2}" method="POST">
            <div class="col-md-6">
              <label for="inputEmail4" class="form-label">Employee ID </label>
              <input type="text" class="form-control" id="inputEmail4" th:field="*{id}">
            </div>
            <div class="col-md-6">
              <label for="inputPassword4" class="form-label">Employee Name</label>
              <input type="text" class="form-control" id="inputPassword4" th:field="*{name}">
            </div>

            <div class="col-md-6">
              <label for="inputPassword4" class="form-label">Employee Designation</label>
              <input type="text" class="form-control" id="inputPassword4" th:field="*{designation}">
            </div>

            
            <div class="col-md-6">
              <label for="inputPassword4" class="form-label">Employee Salary</label>
              <input type="text" class="form-control" id="inputPassword4" th:field="*{Salary}">
            </div>
           
            <div class="col-12">
              <button type="submit" class="btn btn-primary">Update</button>
