<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Enrollment | Guild Register</title>
    <!-- Google Fonts: Space Grotesk & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        :root {
            --bg-primary: #0B0B0B;
            --bg-secondary: #121212;
            --accent-crimson: #A30000;
            --accent-crimson-glow: rgba(163, 0, 0, 0.45);
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
            --border-color: rgba(163, 0, 0, 0.35);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Diagonal visual textures */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(135deg, rgba(163, 0, 0, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        .register-card {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-crimson);
            border-radius: 0;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.65), 
                        0 0 20px var(--accent-crimson-glow);
            transition: all 0.25s ease;
        }

        .panel-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: var(--text-primary);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }

        .panel-subheading {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Form styling */
        .form-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control-cyber {
            background: #0B0B0B;
            border: 1px solid var(--border-color);
            border-radius: 0;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            width: 100%;
        }

        .form-control-cyber:focus {
            background: #000;
            border-color: var(--accent-crimson);
            box-shadow: 0 0 12px var(--accent-crimson-glow);
            outline: none;
            color: #fff;
        }

        .form-control-cyber:disabled, .form-control-cyber[readonly] {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
        }

        /* Dropdown custom look */
        select.form-control-cyber {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23B3B3B3' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 12px;
            padding-right: 40px;
        }

        .btn-cyber {
            background: var(--accent-crimson);
            border: none;
            border-radius: 0;
            color: #fff;
            padding: 14px 30px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(163, 0, 0, 0.3);
            height: 48px;
        }

        .btn-cyber:hover {
            background: #c30000;
            box-shadow: 0 0 15px var(--accent-crimson-glow);
        }

        .btn-secondary-cyber {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 0;
            color: var(--text-primary);
            padding: 12px 25px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            height: 48px;
        }

        .btn-secondary-cyber:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #fff;
            color: #fff;
        }

        /* Mobile Adjustments */
        @media (max-width: 576px) {
            .register-card {
                padding: 30px 20px;
            }
            .panel-heading {
                font-size: 1.4rem;
            }
            .d-flex-mobile {
                flex-direction: column-reverse;
                gap: 15px;
            }
            .d-flex-mobile a, .d-flex-mobile button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            
            <h2 class="panel-heading">Hero Enrollment</h2>
            <p class="panel-subheading">Create your profile, select your class, and register your character.</p>

            <form class="row g-4" th:action="@{/register}" th:object="${employee}" method="POST">
                
                <div class="col-md-6">
                    <label for="id" class="form-label">Registry Hero ID</label>
                    <input type="number" class="form-control-cyber" id="id" th:field="*{id}" required placeholder="e.g. 1002">
                </div>
                
                <div class="col-md-6">
                    <label for="name" class="form-label">Hero Name</label>
                    <input type="text" class="form-control-cyber" id="name" th:field="*{name}" required placeholder="e.g. Luffy">
                </div>

                <div class="col-md-6">
                    <label for="password" class="form-label">Access Passcode</label>
                    <input type="password" class="form-control-cyber" id="password" th:field="*{password}" required placeholder="••••••••">
                </div>

                <div class="col-md-6">
                    <label for="designation" class="form-label">Guild Designation</label>
                    <input type="text" class="form-control-cyber" id="designation" th:field="*{designation}" readonly>
                </div>

                <div class="col-md-6">
                    <label for="salary" class="form-label">Requested Gold Payout ($)</label>
                    <input type="number" step="0.01" class="form-control-cyber" id="salary" th:field="*{Salary}" required placeholder="e.g. 5000">
                </div>

                <div class="col-md-6">
                    <label for="animeAlias" class="form-label">Anime Alias / Title</label>
                    <input type="text" class="form-control-cyber" id="animeAlias" th:field="*{animeAlias}" placeholder="e.g. Pirate Captain">
                </div>

                <div class="col-md-6">
                    <label for="avatar" class="form-label">Select Avatar Class</label>
                    <select class="form-control-cyber" id="avatar" th:field="*{avatar}">
                        <option value="naruto">Naruto (Ninja)</option>
                        <option value="luffy">Luffy (Pirate)</option>
                        <option value="gojo">Gojo (Sorcerer)</option>
                        <option value="nezuko">Nezuko (Demon)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="powerLevel" class="form-label">Initial Power Level</label>
                    <input type="number" class="form-control-cyber" id="powerLevel" th:field="*{powerLevel}" readonly>
                </div>

                <div class="col-md-6">
                    <label for="magicElement" class="form-label">Elemental Affinity</label>
                    <input type="text" class="form-control-cyber" id="magicElement" th:field="*{magicElement}" placeholder="e.g. Fire, Lightning">
                </div>

                <div class="col-md-6">
                    <label for="specialAbility" class="form-label">Special Ability</label>
                    <input type="text" class="form-control-cyber" id="specialAbility" th:field="*{specialAbility}" placeholder="e.g. Gum-Gum Pistol">
                </div>

                <div class="col-12 mt-5 d-flex d-flex-mobile justify-content-between align-items-center">
                    <a th:href="@{/}" class="btn-secondary-cyber">Cancel Enrollment</a>
                    <button type="submit" class="btn-cyber">Enroll Hero</button>
                </div>
            </form>
            
        </div>
    </div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
