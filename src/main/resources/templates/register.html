<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Enrollment | Guild Register</title>
    <!-- Google Fonts: Space Grotesk & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        :root {
            --bg-color: #06070a;
            --card-bg: rgba(13, 15, 24, 0.75);
            --neon-pink: #ff007f;
            --neon-cyan: #00f0ff;
            --neon-violet: #8b5cf6;
            --neon-yellow: #ffb703;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.12) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanline gaming grid */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .register-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            z-index: 10;
        }

        .register-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(139, 92, 246, 0.1);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .register-card:hover {
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 30px rgba(0, 240, 255, 0.08);
        }

        .panel-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-violet), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .panel-subheading {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Form styling */
        .form-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-control-cyber {
            background: rgba(6, 7, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .form-control-cyber:focus {
            background: rgba(6, 7, 10, 0.98);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            outline: none;
            color: #fff;
        }

        .form-control-cyber:disabled, .form-control-cyber[readonly] {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.35);
        }

        /* Dropdown custom look */
        select.form-control-cyber {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 14px;
            padding-right: 45px;
        }

        .btn-cyber {
            background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-violet) 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            padding: 14px 35px;
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn-cyber:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
            filter: brightness(1.1);
        }

        .btn-secondary-cyber {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 25px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s ease;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary-cyber:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #fff;
            color: #fff;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card animate-fade-in">
            
            <h2 class="panel-heading">Hero Enrollment</h2>
            <p class="panel-subheading">Create your profile, select your class, and register your character.</p>

            <form class="row g-4" th:action="@{/register}" th:object="${employee}" method="POST">
                
                <div class="col-md-6">
                    <label for="id" class="form-label">Registry Hero ID</label>
                    <input type="number" class="form-control-cyber" id="id" th:field="*{id}" required placeholder="e.g. 1002">
                </div>
                
                <div class="col-md-6">
                    <label for="name" class="form-label">Hero Name</label>
                    <input type="text" class="form-control-cyber" id="name" th:field="*{name}" required placeholder="e.g. Luffy">
                </div>

                <div class="col-md-6">
                    <label for="password" class="form-label">Access Passcode (Password)</label>
                    <input type="password" class="form-control-cyber" id="password" th:field="*{password}" required placeholder="••••••••">
                </div>

                <div class="col-md-6">
                    <label for="designation" class="form-label">Guild Designation</label>
                    <input type="text" class="form-control-cyber" id="designation" th:field="*{designation}" readonly>
                </div>

                <div class="col-md-6">
                    <label for="salary" class="form-label">Requested Gold Payout ($)</label>
                    <input type="number" step="0.01" class="form-control-cyber" id="salary" th:field="*{Salary}" required placeholder="e.g. 5000">
                </div>

                <div class="col-md-6">
                    <label for="animeAlias" class="form-label">Anime Alias / Title</label>
                    <input type="text" class="form-control-cyber" id="animeAlias" th:field="*{animeAlias}" placeholder="e.g. Pirate Captain">
                </div>

                <div class="col-md-6">
                    <label for="avatar" class="form-label">Select Avatar Class</label>
                    <select class="form-control-cyber" id="avatar" th:field="*{avatar}">
                        <option value="naruto">Naruto (Ninja)</option>
                        <option value="luffy">Luffy (Pirate)</option>
                        <option value="gojo">Gojo (Sorcerer)</option>
                        <option value="nezuko">Nezuko (Demon)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="powerLevel" class="form-label">Initial Combat Power Level</label>
                    <input type="number" class="form-control-cyber" id="powerLevel" th:field="*{powerLevel}" readonly>
                </div>

                <div class="col-md-6">
                    <label for="magicElement" class="form-label">Elemental Affinity</label>
                    <input type="text" class="form-control-cyber" id="magicElement" th:field="*{magicElement}" placeholder="e.g. Fire, Lightning, Water">
                </div>

                <div class="col-md-6">
                    <label for="specialAbility" class="form-label">Special Ability</label>
                    <input type="text" class="form-control-cyber" id="specialAbility" th:field="*{specialAbility}" placeholder="e.g. Gum-Gum Pistol">
                </div>

                <div class="col-12 mt-5 d-flex justify-content-between align-items-center">
                    <a th:href="@{/}" class="btn-secondary-cyber">Cancel Enrollment</a>
                    <button type="submit" class="btn-cyber">Enroll Hero</button>
                </div>
            </form>
            
        </div>
    </div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
